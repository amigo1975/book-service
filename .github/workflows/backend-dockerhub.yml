name: Build - Test - Docker

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generar JAR sin tests
        run: mvn clean package -DskipTests

      - name: Subir JAR como artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-service-jar
          path: target/book_service.jar

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Ejecutar pruebas unitarias
        run: mvn test

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR generado
        uses: actions/download-artifact@v4
        with:
          name: book-service-jar
          path: target

      - name: Construir imagen Docker
        run: docker build -t mtisw/book_service:latest .

      - name: Guardar imagen Docker como archivo
        run: docker save mtisw/book_service:latest -o book_service_image.tar

      - name: Subir imagen Docker como artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-service-docker-image
          path: book_service_image.tar

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Descargar imagen Docker
        uses: actions/download-artifact@v4
        with:
          name: book-service-docker-image
          path: .

      - name: Cargar imagen Docker
        run: docker load -i book_service_image.tar

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Subir imagen a Docker Hub
        run: docker push mtisw/book_service:latest
